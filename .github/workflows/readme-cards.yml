name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # STATS DARK
      - name: Generate stats (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=tokyonight&show_icons=true&hide_border=false&count_private=true&rank_icon=github
          path: profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # STATS LIGHT
      - name: Generate stats (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=transparent&show_icons=true&hide_border=false&count_private=true&rank_icon=github
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # LANGS DARK
      - name: Generate langs (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=tokyonight
          path: profile/langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # LANGS LIGHT
      - name: Generate langs (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=transparent
          path: profile/langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # WAKATIME DARK
      - name: Generate wakatime (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=xjViper&layout=compact&theme=tokyonight
          path: profile/wakatime-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # WAKATIME LIGHT
      - name: Generate wakatime (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=xjViper&layout=compact&theme=transparent
          path: profile/wakatime-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
